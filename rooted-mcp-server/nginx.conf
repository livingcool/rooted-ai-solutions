server {
    listen 80;
    server_name mcp.rootedai.co.in; # Replace with your actual domain

    root /var/www/rooted-ai-solutions/dist; # POINT THIS TO YOUR REACT BUILD FOLDER
    index index.html;

    # 1. MCP Server Endpoints (Proxy to Node.js)
    # These MUST come before the location / block
    location /sse {
        proxy_pass http://localhost:3000/sse;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        
        # SSE headers
        proxy_set_header Content-Type text/event-stream;
        proxy_set_header Cache-Control no-cache;
        proxy_buffering off;
        proxy_read_timeout 24h;
    }

    location /messages {
        proxy_pass http://localhost:3000/messages;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. React Application (Frontend)
    # Serves the static files or falls back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
